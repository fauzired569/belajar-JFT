<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Flashcard · Pola Kalimat Jepang</title>
  <!-- Font yang nyaman untuk teks Jepang & Latin -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #f7f3e9 0%, #fff9ef 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', 'Noto Sans JP', sans-serif;
      padding: 20px 16px 30px;
      margin: 0;
    }

    .flashcard-container {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 250, 240, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 24px 20px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
      border: 1px solid #f0e5d8;
    }

    h1 {
      font-weight: 600;
      font-size: clamp(1.6rem, 7vw, 2.3rem);
      letter-spacing: -0.01em;
      color: #3b2b1f;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      padding: 0 8px;
    }

    h1 span {
      background: #d9c6b0;
      color: #2d241a;
      font-size: 1rem;
      padding: 4px 14px;
      border-radius: 40px;
      font-weight: 500;
    }

    .sub-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 8px 16px;
      color: #6b5843;
      font-weight: 500;
      flex-wrap: wrap;
      gap: 8px;
    }

    .counter {
      background: #e7dbcd;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 1rem;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }

    /* Kartu utama */
    .card {
      background: #fffffffa;
      border-radius: 42px;
      padding: 2.2rem 1.8rem;
      margin: 8px 0 12px;
      box-shadow: 0 15px 30px -8px rgba(60, 40, 20, 0.15), 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid #f3e7db;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      box-shadow: 0 22px 40px -12px rgba(90, 60, 30, 0.18);
      transform: translateY(-2px);
      background: #fffffe;
    }

    .card:active {
      transform: translateY(2px);
      box-shadow: 0 8px 20px -6px rgba(60, 40, 20, 0.15);
    }

    /* Area pola (depan) */
    .pattern-front {
      text-align: center;
    }

    .pattern-display {
      font-family: 'Noto Sans JP', 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 12vw, 4.8rem);
      line-height: 1.4;
      color: #2e241b;
      word-break: break-word;
      letter-spacing: 0.02em;
      text-shadow: 2px 2px 0 #f5ede3;
      margin-bottom: 12px;
    }

    .pattern-hint {
      font-size: 1rem;
      color: #a28b76;
      font-weight: 500;
      letter-spacing: 0.3px;
      border-top: 1px dashed #dccfc2;
      padding-top: 16px;
      margin-top: 6px;
    }

    .pattern-hint i {
      font-style: normal;
      background: #f1e9e0;
      padding: 4px 10px;
      border-radius: 30px;
    }

    /* Area detail (muncul setelah klik) */
    .detail-panel {
      margin-top: 28px;
      padding: 24px 18px 18px;
      background: #fbf6f0;
      border-radius: 32px;
      border-left: 8px solid #c7af9a;
      transition: all 0.2s;
      box-shadow: inset 0 2px 6px rgba(100, 70, 40, 0.03);
    }

    .detail-panel.hidden {
      display: none;
    }

    .meaning-section {
      margin-bottom: 24px;
    }

    .meaning-label {
      font-weight: 700;
      font-size: 1.3rem;
      color: #4d3826;
      display: block;
      margin-bottom: 12px;
      letter-spacing: -0.2px;
      border-bottom: 2px dotted #bfaa99;
      padding-bottom: 8px;
    }

    .meaning-text {
      font-size: 1.7rem;
      font-weight: 700;
      color: #1f1a15;
      line-height: 1.4;
      word-break: break-word;
      background: #ffffffc7;
      padding: 14px 18px;
      border-radius: 24px;
      box-shadow: 0 2px 8px #e5d9ce;
    }

    .example-section {
      margin-top: 12px;
    }

    .example-label {
      font-weight: 700;
      font-size: 1.2rem;
      color: #5e4b38;
      display: block;
      margin-bottom: 16px;
    }

    .example-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .example-item {
      background: #fffcf9;
      padding: 16px 18px;
      border-radius: 24px;
      box-shadow: 0 3px 8px #ddd0c2;
    }

    .jp-sentence {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      font-size: 1.35rem;
      line-height: 1.6;
      color: #1f2e1b;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .id-translation {
      font-size: 1.1rem;
      color: #4f4237;
      padding-left: 8px;
      border-left: 4px solid #baa89a;
      font-style: italic;
    }

    /* Navigasi */
    .nav-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 24px 0 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: #e7d9cd;
      border: none;
      padding: 14px 24px;
      border-radius: 60px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      color: #33291f;
      box-shadow: 0 6px 0 #b7a18e, 0 4px 12px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: all 0.1s ease;
      border: 1px solid #f0e2d6;
      flex: 0 1 auto;
      min-width: 130px;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #b7a18e, 0 6px 12px rgba(0,0,0,0.05);
    }

    .btn.shuffle {
      background: #cdbcab;
      box-shadow: 0 6px 0 #9f8c7a, 0 4px 12px rgba(0,0,0,0.08);
    }

    .btn.small {
      font-size: 1.1rem;
      padding: 10px 18px;
      min-width: 100px;
    }

    .footer-note {
      margin-top: 16px;
      color: #7f6e5d;
      font-size: 0.9rem;
      text-align: center;
    }

    /* status loading/error */
    .status-message {
      text-align: center;
      padding: 40px;
      font-size: 1.5rem;
      color: #6b5843;
    }

    /* mobile optimalisasi */
    @media (max-width: 520px) {
      body { padding: 12px 8px; }
      .flashcard-container { padding: 16px 12px 24px; border-radius: 32px; }
      .card { padding: 1.8rem 1rem; border-radius: 32px; }
      .pattern-display { font-size: 2.2rem; }
      .meaning-text { font-size: 1.5rem; }
      .btn { padding: 12px 14px; font-size: 1.1rem; min-width: 110px; }
    }

    /* untuk layar sangat kecil */
    @media (max-width: 360px) {
      .pattern-display { font-size: 1.9rem; }
      .btn { min-width: 90px; font-size: 1rem; }
    }

    /* tidak ada tumpang tindih */
    .card, .detail-panel {
      word-break: break-word;
    }
  </style>
</head>
<body>
<div class="flashcard-container">
  <h1>
    📇 Pola Kalimat
    <span>flashcard</span>
  </h1>
  <div class="sub-head">
    <div class="counter" id="counterDisplay">- / -</div>
    <div style="font-size:0.95rem;">✨ klik kartu untuk lihat arti & contoh</div>
  </div>

  <!-- Kartu flashcard -->
  <div class="card" id="flashcard">
    <div class="pattern-front">
      <div class="pattern-display" id="patternText">―</div>
      <div class="pattern-hint">
        <i>👆 ketuk / klik kartu</i>
      </div>
    </div>
    <!-- Panel detail (tersembunyi default) -->
    <div id="detailPanel" class="detail-panel hidden">
      <div class="meaning-section">
        <span class="meaning-label">📖 Arti</span>
        <div class="meaning-text" id="meaningText">-</div>
      </div>
      <div class="example-section">
        <span class="example-label">📝 Contoh kalimat</span>
        <div class="example-list" id="exampleList"></div>
      </div>
    </div>
  </div>

  <!-- Navigasi -->
  <div class="nav-controls">
    <button class="btn small" id="prevBtn" title="Pola sebelumnya">← Sebelumnya</button>
    <button class="btn shuffle" id="shuffleBtn">🔀 Acak</button>
    <button class="btn small" id="nextBtn" title="Pola selanjutnya">Berikutnya →</button>
  </div>
  <div class="footer-note">
    ⚡ Data dari <strong>Data Pola kalimat.json</strong> · total <span id="totalCount">0</span> pola
  </div>
</div>

<script>
  (function() {
    "use strict";

    // DOM elements
    const patternEl = document.getElementById('patternText');
    const meaningEl = document.getElementById('meaningText');
    const exampleListEl = document.getElementById('exampleList');
    const detailPanel = document.getElementById('detailPanel');
    const counterDisplay = document.getElementById('counterDisplay');
    const totalSpan = document.getElementById('totalCount');
    const flashcardDiv = document.getElementById('flashcard');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');

    // State
    let polaData = [];              // array dari JSON
    let currentIndex = 0;
    let isDetailVisible = false;    // apakah panel detail terbuka

    // Format pola dari data (bisa string atau array)
    function formatPola(pola) {
      if (Array.isArray(pola)) {
        return pola.join('  ·  ');
      }
      return pola;
    }

    // Render pola ke tampilan depan (sembunyikan detail)
    function renderFront(index) {
      if (!polaData.length) return;
      const item = polaData[index];
      const polaRaw = item.pola;
      patternEl.textContent = formatPola(polaRaw);
      
      // Sembunyikan panel detail dan reset flag
      detailPanel.classList.add('hidden');
      isDetailVisible = false;
      
      // Update counter
      counterDisplay.textContent = `${index + 1} / ${polaData.length}`;
    }

    // Render detail (arti + contoh) berdasarkan item saat ini
    function renderDetail(item) {
      // Arti
      meaningEl.textContent = item.arti || '(tidak ada arti)';
      
      // Contoh kalimat
      const contohArray = item.contoh || [];
      exampleListEl.innerHTML = '';
      
      if (contohArray.length === 0) {
        // fallback jika tidak ada contoh
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'example-item';
        emptyMsg.innerHTML = `<div class="jp-sentence">—</div><div class="id-translation">(belum ada contoh)</div>`;
        exampleListEl.appendChild(emptyMsg);
      } else {
        contohArray.forEach(cth => {
          const exampleDiv = document.createElement('div');
          exampleDiv.className = 'example-item';
          
          const jpP = document.createElement('div');
          jpP.className = 'jp-sentence';
          jpP.textContent = cth.kalimat || '';
          
          const idP = document.createElement('div');
          idP.className = 'id-translation';
          idP.textContent = cth.terjemahan || '';
          
          exampleDiv.appendChild(jpP);
          exampleDiv.appendChild(idP);
          exampleListEl.appendChild(exampleDiv);
        });
      }
    }

    // Tampilkan detail (jika tersembunyi) atau sembunyikan jika sudah tampil? 
    // Sesuai permintaan: saat ditekan muncul arti & contoh. Kalau sudah muncul dan ditekan lagi? 
    // Lebih natural: toggle (bisa tutup). Atau selalu tampilkan saat diklik dari keadaan tersembunyi.
    // Kami buat toggle: jika hidden -> tampilkan, jika visible -> sembunyikan.
    function toggleDetail() {
      if (!polaData.length) return;
      
      if (detailPanel.classList.contains('hidden')) {
        // render ulang detail (memastikan sinkron dengan currentIndex)
        const currentItem = polaData[currentIndex];
        renderDetail(currentItem);
        detailPanel.classList.remove('hidden');
        isDetailVisible = true;
      } else {
        detailPanel.classList.add('hidden');
        isDetailVisible = false;
      }
    }

    // Fungsi utama untuk pindah ke indeks baru
    function goToIndex(newIndex) {
      if (!polaData.length) return;
      // wrap around
      if (newIndex < 0) newIndex = polaData.length - 1;
      if (newIndex >= polaData.length) newIndex = 0;
      
      currentIndex = newIndex;
      renderFront(currentIndex);
      
      // Jika detail sedang terbuka, perbarui kontennya agar tetap sinkron
      if (!detailPanel.classList.contains('hidden')) {
        const currentItem = polaData[currentIndex];
        renderDetail(currentItem);
      }
    }

    // Acak indeks
    function shuffleIndex() {
      if (!polaData.length) return;
      const randomIndex = Math.floor(Math.random() * polaData.length);
      goToIndex(randomIndex);
    }

    // Inisialisasi setelah fetch
    function initializeData(data) {
      polaData = data;
      totalSpan.textContent = polaData.length;
      
      if (polaData.length > 0) {
        // Mulai dari indeks 0 (atau acak, tapi sesuai kebutuhan)
        currentIndex = 0;
        renderFront(currentIndex);
        // Pastikan detail tersembunyi
        detailPanel.classList.add('hidden');
        isDetailVisible = false;
      } else {
        patternEl.textContent = 'Tidak ada data';
        counterDisplay.textContent = '0 / 0';
      }
    }

    // Fetch JSON
    async function loadPolaData() {
      try {
        // Path relatif dari root (sesuai struktur project)
        const response = await fetch('data/Data Pola kalimat.json');
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }
        const json = await response.json();
        initializeData(json);
      } catch (error) {
        console.error('Gagal memuat data pola:', error);
        patternEl.textContent = '⚠️ Gagal memuat';
        counterDisplay.textContent = '? / ?';
        totalSpan.textContent = '?';
        // Tampilkan pesan error di area contoh
        meaningEl.textContent = 'Terjadi kesalahan saat mengambil data. Pastikan file JSON tersedia.';
        exampleListEl.innerHTML = '<div class="example-item"><div class="jp-sentence">Periksa console</div></div>';
        detailPanel.classList.remove('hidden'); // tampilkan pesan error
      }
    }

    // --- Event Listeners ---
    
    // Klik pada kartu (flashcard) untuk toggle detail
    flashcardDiv.addEventListener('click', (e) => {
      // Jangan toggle jika klik berasal dari tombol navigasi (tapi tombol di luar kartu)
      // Aman karena tombol tidak di dalam .card
      toggleDetail();
    });

    // Navigasi
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (polaData.length) goToIndex(currentIndex - 1);
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (polaData.length) goToIndex(currentIndex + 1);
    });

    shuffleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      shuffleIndex();
    });

    // Keyboard support (opsional: panah kiri/kanan)
    window.addEventListener('keydown', (e) => {
      if (!polaData.length) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        goToIndex(currentIndex - 1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        goToIndex(currentIndex + 1);
      } else if (e.key === ' ' || e.key === 'Space') {
        // Spasi untuk toggle detail
        e.preventDefault();
        toggleDetail();
      } else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        shuffleIndex();
      }
    });

    // Touch & klik sudah aman, pastikan tidak ada double tap zoom mengganggu (tapi bisa)
    // Pastikan saat data belum ada, tombol tidak error
    // Mulai fetch
    loadPolaData();
  })();
</script>
</body>
</html>
